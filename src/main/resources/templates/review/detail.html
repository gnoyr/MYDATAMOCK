<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>추가심사 - 신청 ID: <span th:text="${detail.creditAppId}"></span></title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
        h1 { font-size: 22px; margin-bottom: 24px; }
        h2 { font-size: 16px; margin: 28px 0 10px; color: #374151; border-bottom: 2px solid #e5e7eb; padding-bottom: 6px; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .info-item { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 6px; padding: 10px 14px; }
        .info-item label { font-size: 12px; color: #6b7280; display: block; margin-bottom: 4px; }
        .info-item span { font-size: 15px; font-weight: 600; }
        .doc-link { font-size: 13px; color: #2563eb; word-break: break-all; }
        .doc-none { color: #9ca3af; font-size: 13px; }
        .form-section { margin-top: 30px; }
        .check-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; padding: 12px 16px;
                     border: 1px solid #e5e7eb; border-radius: 6px; }
        .check-row label { font-size: 14px; font-weight: 600; flex: 1; }
        .check-row input[type=checkbox] { width: 18px; height: 18px; cursor: pointer; }
        .income-row { margin-top: 20px; }
        .income-row label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px; }
        .income-row input { width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 6px;
                            font-size: 15px; box-sizing: border-box; }
        .income-hint { font-size: 12px; color: #6b7280; margin-top: 4px; }
        .btn-submit { margin-top: 28px; width: 100%; padding: 14px; background: #2563eb; color: #fff;
                      border: none; border-radius: 6px; font-size: 16px; font-weight: 700; cursor: pointer; }
        .btn-submit:hover { background: #1d4ed8; }
        .btn-back { display: inline-block; margin-bottom: 16px; color: #6b7280; text-decoration: none; font-size: 14px; }
        .alert-error { background: #fee2e2; border: 1px solid #fca5a5; padding: 10px 16px;
                       border-radius: 4px; margin-bottom: 16px; color: #991b1b; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: 600; }
        .badge-high { background: #dcfce7; color: #166534; }
        .badge-mid  { background: #fef9c3; color: #854d0e; }
        .badge-low  { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>
    <a class="btn-back" href="/admin/review">← 목록으로</a>
    <h1>추가심사 — 신청 ID: <span th:text="${detail.creditAppId}"></span></h1>

    <div class="alert-error" th:if="${errorMsg}" th:text="${errorMsg}"></div>

    <!-- 마이데이터 신용 정보 (읽기 전용) -->
    <h2>마이데이터 신용 정보</h2>
    <div class="info-grid">
        <div class="info-item">
            <label>신용점수</label>
            <span th:text="${detail.creditScore != null ? detail.creditScore + '점' : '-'}"></span>
        </div>
        <div class="info-item">
            <label>대출 잔액</label>
            <span th:text="${detail.loanBalance != null ? #numbers.formatInteger(detail.loanBalance, 0, 'COMMA') + '원' : '-'}"></span>
        </div>
        <div class="info-item">
            <label>연체율</label>
            <span th:text="${detail.delinquencyRate != null ? detail.delinquencyRate + '%' : '-'}"></span>
        </div>
        <div class="info-item">
            <label>다중채무건수</label>
            <span th:text="${detail.multiDebtCount != null ? detail.multiDebtCount + '건' : '-'}"></span>
        </div>
        <div class="info-item">
            <label>직업유형</label>
            <span th:text="${detail.jobType != null ? detail.jobType : '-'}"></span>
        </div>
        <div class="info-item">
            <label>차량 보유 수</label>
            <span th:text="${detail.carCount != null ? detail.carCount + '대' : '-'}"></span>
        </div>
    </div>

    <!-- 제출 서류 -->
    <h2>제출 서류</h2>
    <div class="info-grid">
        <div class="info-item">
            <label>소득서류</label>
            <span th:if="${detail.incomeDocKey != null}" class="doc-link" th:text="${detail.incomeDocKey}"></span>
            <span th:if="${detail.incomeDocKey == null}" class="doc-none">미제출</span>
        </div>
        <div class="info-item">
            <label>재산서류</label>
            <span th:if="${detail.assetDocKey != null}" class="doc-link" th:text="${detail.assetDocKey}"></span>
            <span th:if="${detail.assetDocKey == null}" class="doc-none">미제출</span>
        </div>
        <div class="info-item">
            <label>직업서류</label>
            <span th:if="${detail.jobDocKey != null}" class="doc-link" th:text="${detail.jobDocKey}"></span>
            <span th:if="${detail.jobDocKey == null}" class="doc-none">미제출</span>
        </div>
    </div>

    <!-- 심사 입력 Form -->
    <h2>심사 입력</h2>
    <form class="form-section" th:action="@{/admin/review/{id}(id=${detail.creditAppId})}" method="post">

        <div class="check-row">
            <label>소득서류 진위확인</label>
            <input type="checkbox" name="incomeDocOk" value="true">
            <span style="font-size:13px;color:#6b7280;">서류 내용이 사실과 일치함</span>
        </div>
        <div class="check-row">
            <label>재산서류 진위확인</label>
            <input type="checkbox" name="assetDocOk" value="true">
            <span style="font-size:13px;color:#6b7280;">서류 내용이 사실과 일치함</span>
        </div>
        <div class="check-row">
            <label>직업서류 진위확인</label>
            <input type="checkbox" name="jobDocOk" value="true">
            <span style="font-size:13px;color:#6b7280;">서류 내용이 사실과 일치함</span>
        </div>

        <div class="income-row">
            <label>실제 월소득 (소득서류 기준)</label>
            <input type="number" name="estimatedMonthlyIncome" placeholder="예: 3500000" min="0">
            <div class="income-hint">* 서류 미진위 시 입력 불필요. 진위 통과 시 필수 입력.</div>
        </div>

        <button class="btn-submit" type="submit">심사 결과 전송</button>
    </form>
</body>
</html>
